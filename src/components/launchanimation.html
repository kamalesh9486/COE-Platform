
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

.scene {
  width: 100%;
  min-height: 560px;
  background: #1a1a1a;
  border-radius: 16px;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 28px 24px 32px;
}

.grid-bg {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px);
  background-size: 36px 36px;
  border-radius: 16px;
}

.tab-bar {
  position: relative;
  z-index: 10;
  display: flex;
  background: #2a2a2a;
  border-radius: 10px;
  padding: 4px;
  gap: 2px;
  margin-bottom: 28px;
  opacity: 0;
  transform: translateY(-10px);
  animation: fadeUp 0.5s ease 0.1s forwards;
}

.tab {
  padding: 7px 28px;
  border-radius: 7px;
  font-size: 14px;
  font-weight: 500;
  color: #888;
  cursor: pointer;
  transition: all 0.2s;
  font-family: sans-serif;
}

.tab.active {
  background: #3a3a3a;
  color: #fff;
}

.cards-area {
  position: relative;
  width: 100%;
  max-width: 700px;
  height: 420px;
}

.card {
  position: absolute;
  background: #242424;
  border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 16px;
  font-family: sans-serif;
}

.card-file {
  left: 0;
  top: 0;
  width: 220px;
  opacity: 0;
  transform: translateX(-20px);
  animation: fadeRight 0.5s ease 0.3s forwards;
}

.card-progress {
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  top: 80px;
  width: 240px;
  opacity: 0;
  animation: fadeUp 0.5s ease 0.55s forwards;
}

.card-context {
  right: 0;
  top: 0;
  width: 210px;
  opacity: 0;
  transform: translateX(20px);
  animation: fadeLeft 0.5s ease 0.4s forwards;
}

@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0) translateX(-50%); }
}
@keyframes fadeUpSimple {
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeRight {
  to { opacity: 1; transform: translateX(0); }
}
@keyframes fadeLeft {
  to { opacity: 1; transform: translateX(0); }
}

.tab-bar { animation: fadeUpSimple 0.5s ease 0.1s forwards; }

.card-label {
  font-size: 12px;
  font-weight: 500;
  color: #aaa;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.search-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #2e2e2e;
  border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 7px 10px;
  margin-bottom: 14px;
}

.search-bar svg { flex-shrink: 0; }

.search-bar span {
  font-size: 13px;
  color: #666;
  font-family: sans-serif;
}

.folder-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 14px;
}

.folder-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.folder-icon {
  width: 44px;
  height: 36px;
}

.folder-label {
  font-size: 11px;
  color: #ccc;
  text-align: center;
  font-family: sans-serif;
  line-height: 1.3;
}

.file-btns {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 4px;
}

.btn-cancel {
  padding: 5px 12px;
  border-radius: 7px;
  border: 0.5px solid rgba(255,255,255,0.15);
  background: transparent;
  color: #aaa;
  font-size: 12px;
  cursor: pointer;
  font-family: sans-serif;
}

.btn-open {
  padding: 5px 14px;
  border-radius: 7px;
  border: none;
  background: #2563eb;
  color: #fff;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: sans-serif;
}

.chevron {
  opacity: 0.5;
}

.progress-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 4px;
}

.progress-item {
  display: flex;
  align-items: center;
  gap: 10px;
  opacity: 0;
  transform: translateX(-8px);
}

.check-circle {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #2563eb;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.progress-text {
  font-size: 12.5px;
  color: #666;
  text-decoration: line-through;
  font-family: sans-serif;
}

.context-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-top: 4px;
}

.ctx-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 6px;
  border-radius: 8px;
  opacity: 0;
  transform: translateX(8px);
}

.ctx-icon {
  width: 28px;
  height: 28px;
  border-radius: 7px;
  background: #333;
  border: 0.5px solid rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 13px;
}

.ctx-label {
  font-size: 12.5px;
  color: #ddd;
  font-family: sans-serif;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
</style>

<script>
(function() {
  function animateItems(selector, prop) {
    document.querySelectorAll(selector).forEach(el => {
      const delay = parseInt(el.dataset.delay || 0);
      setTimeout(() => {
        el.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
        el.style.opacity = '1';
        el.style.transform = 'translateX(0)';
      }, delay);
    });
  }

  animateItems('#progressList .progress-item');
  animateItems('#ctxList .ctx-item');

  function loop() {
    const items = document.querySelectorAll('#progressList .progress-item');
    let i = 0;
    function tick() {
      if (i >= items.length) {
        setTimeout(() => {
          items.forEach(el => {
            el.style.opacity = '0';
            el.style.transform = 'translateX(-8px)';
          });
          i = 0;
          setTimeout(tick, 600);
        }, 3000);
        return;
      }
      const el = items[i];
      setTimeout(() => {
        el.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
        el.style.opacity = '1';
        el.style.transform = 'translateX(0)';
        i++;
        tick();
      }, 180);
    }
    setTimeout(tick, 3200);
  }
  loop();
})();
</script>
